services:
  # Backend Laravel
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: bssahty-api
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    networks:
      - bssahty-network

  # Serveur Web Nginx
  nginx:
    image: nginx:latest
    container_name: laravel_nginx
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - bssahty-network

  # Base de données MySQL 8 (Support Spatial)
  db:
    image: mysql:8.0
    container_name: bssahty-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: bssahty
      MYSQL_ROOT_PASSWORD: bssahty
    ports:
      - "${DB_PORT:-3306}:3306"
    networks:
      - bssahty-network

networks:
  bssahty-network:
    driver: bridge